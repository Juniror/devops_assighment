---
# ConfigMap for API with Cluster Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: bookstore-api-cluster-config
  namespace: dev
  labels:
    app: bookstore-api
    version: cluster
data:
  # Write database (Primary through PgBouncer)
  DB_WRITE_HOST: "bookstore-postgres-cluster-pooler.dev.svc.cluster.local"

  # Read database (Replicas through PgBouncer)
  DB_READ_HOST: "bookstore-postgres-cluster-pooler-repl.dev.svc.cluster.local"

  # Common database settings
  DB_NAME: "bookstore"
  DB_USER: "bookstore_user"
  DB_PORT: "5432"

---
# Deployment for API with Cluster Support
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bookstore-api-cluster
  namespace: dev
  labels:
    app: bookstore-api
    version: cluster
spec:
  replicas: 3  # เพิ่ม replicas เนื่องจาก database สามารถรองรับได้มากขึ้น
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Zero downtime deployment

  selector:
    matchLabels:
      app: bookstore-api
      version: cluster

  template:
    metadata:
      labels:
        app: bookstore-api
        version: cluster
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      # Anti-affinity เพื่อกระจาย pods
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - bookstore-api
                topologyKey: kubernetes.io/hostname

      containers:
        - name: api
          image: localhost:5000/bookstore-api:cluster
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http
              protocol: TCP

          env:
            # Write database configuration (Primary)
            - name: DB_WRITE_HOST
              valueFrom:
                configMapKeyRef:
                  name: bookstore-api-cluster-config
                  key: DB_WRITE_HOST

            # Read database configuration (Replicas)
            - name: DB_READ_HOST
              valueFrom:
                configMapKeyRef:
                  name: bookstore-api-cluster-config
                  key: DB_READ_HOST

            # Common database configuration
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: bookstore-api-cluster-config
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: bookstore-api-cluster-config
                  key: DB_USER

            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: bookstore-api-cluster-config
                  key: DB_PORT

            # Password from cluster secret
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bookstore-user.bookstore-postgres-cluster.credentials.postgresql.acid.zalan.do
                  key: password

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          # Health checks
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Startup probe สำหรับ slow start
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

---
# Service for API
apiVersion: v1
kind: Service
metadata:
  name: bookstore-api-cluster
  namespace: dev
  labels:
    app: bookstore-api
    version: cluster
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: bookstore-api
    version: cluster

---
# HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: bookstore-api-cluster-hpa
  namespace: dev
  labels:
    app: bookstore-api
    version: cluster
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: bookstore-api-cluster

  minReplicas: 3
  maxReplicas: 10

  metrics:
    # CPU-based scaling
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    # Memory-based scaling
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min

    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: bookstore-api-cluster-pdb
  namespace: dev
  labels:
    app: bookstore-api
    version: cluster
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: bookstore-api
      version: cluster